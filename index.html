<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Arcade | Práctica de Funciones</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="contenedor-juego">
    <div class="header-arcade">
      <span>1UP<br>00</span>
      <span>HIGH SCORE<br>99990</span>
      <span>CREDIT 0</span>
    </div>
    
    <svg class="ghost" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
      <path fill="#cccccc" d="M7 0C3.13 0 0 3.13 0 7v7l2-2 1.5 2L5 12l2 2 2-2 1.5 2 1.5-2L14 14V7c0-3.87-3.13-7-7-7z"/>
      <path fill="#ffffff" d="M3 4h2v3H3zm5 0h2v3H8z"/>
      <path fill="#000000" d="M4 5h1v1H4zm5 0h1v1H9z"/>
    </svg>
    
    <h1>JS ARCADE</h1>
    
    <div class="controles-arcade">
      <button id="btn-ant" class="btn-arcade" onclick="anterior()">◀ ANT</button>
      <span id="titulo-reto" class="titulo-reto">Cargando...</span>
      <button id="btn-sig" class="btn-arcade" onclick="siguiente()">SIG ▶</button>
    </div>

    <div class="texto-consola" id="pantalla-consola">
      </div>

    <div class="blinking-text">INSERT COIN</div>
  </div>

  <script>
    const retos = [
      { file: 'reto-1.js', name: 'NIVEL 1: Tu primera función' },
      { file: 'reto-2.js', name: 'NIVEL 2: La calculadora' },
      { file: 'reto-3.js', name: 'NIVEL 3: Despacho a domicilio' },
      { file: 'reto-4.js', name: 'NIVEL 4: Semáforo de notas' },
      { file: 'reto-5.js', name: 'NIVEL 5: La caja fuerte' },
      { file: 'reto-6.js', name: 'NIVEL 6: Portero del evento' },
      { file: 'reto-7.js', name: 'NIVEL 7: Credenciales' },
      // Aquí están las espadas Arcade ASCII
      { file: 'jefe-final.js', name: 'O==[===> JEFE FINAL <===]==O' }
    ];
    
    let currentIndex = 0;

    const originalLog = console.log;
    console.log = function(...args) {
      originalLog.apply(console, args); 
      const output = document.getElementById('pantalla-consola');
      if (output) {
          const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
          output.innerHTML += `<p>> ${msg}</p>`;
      }
    };

    window.onerror = function(message) {
      const output = document.getElementById('pantalla-consola');
      if (output) output.innerHTML += `<p class="error">> ERROR: ${message}</p>`;
    };

    function cargarReto(index) {
      if(index < 0 || index >= retos.length) return;
      currentIndex = index;
      
      document.getElementById('titulo-reto').innerText = retos[currentIndex].name;
      document.getElementById('pantalla-consola').innerHTML = `<p style="color:#555;">> Ejecutando ${retos[currentIndex].file}...</p>`;
      
      document.getElementById('btn-ant').disabled = (currentIndex === 0);
      document.getElementById('btn-sig').disabled = (currentIndex === retos.length - 1);

      const script = document.createElement('script');
      script.type = 'module'; 
      script.src = retos[currentIndex].file + '?v=' + Date.now(); 
      document.body.appendChild(script);
    }

    function anterior() { cargarReto(currentIndex - 1); }
    function siguiente() { cargarReto(currentIndex + 1); }

    window.onload = () => cargarReto(0);
  </script>
</body>
</html>
